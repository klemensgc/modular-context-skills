<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- REPLACE: title --></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════
     SIEBE LIGHT — Inter + JetBrains Mono
     Accent: #EB670F (orange)  Background: #FFFFFF
     ═══════════════════════════════════════════ */

  :root {
    --bg: #FFFFFF;
    --bg-card: rgba(0,0,0,0.025);
    --bg-card-hover: rgba(0,0,0,0.045);
    --text: #050403;
    --text-secondary: #3d3a38;
    --text-muted: #8a8785;
    --accent: #EB670F;
    --accent-light: #E9955C;
    --accent-dim: rgba(235,103,15,0.10);
    --accent-glow: rgba(235,103,15,0.06);
    --surface: #F7F6F6;
    --code-bg: #F7F6F6;
    --border: #e8e6e5;
    --border-accent: rgba(235,103,15,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  @page { size: A4; margin: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text);
    font-size: 9pt;
    line-height: 1.55;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    background: #d4d4d4;
  }

  a { color: var(--accent); text-decoration: none; }

  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: var(--code-bg);
    padding: 0.5px 4px;
    border-radius: 2px;
    color: var(--accent);
  }

  /* ═══ PAGE SETUP (QG-1 compliant: flexbox + height) ═══ */
  .page {
    width: 210mm;
    height: 297mm;
    padding: 20mm 24mm 18mm 24mm;
    overflow: hidden;
    position: relative;
    background: var(--bg);
    page-break-after: always;
    display: flex;
    flex-direction: column;
  }
  .page-content { flex: 1; }
  .page > *:not(.signet-bg):not(.footer-bar) { position: relative; z-index: 1; }

  /* ═══ SIGNET WATERMARK (na kazdej stronie!) ═══ */
  .signet-bg {
    position: absolute;
    left: 12mm;
    top: 38mm;
    opacity: 0.03;
    z-index: 0;
    pointer-events: none;
  }
  .signet-bg svg { width: 300pt; height: auto; }

  /* ═══ BRAND HEADER ═══ */
  .brand-header {
    display: flex;
    align-items: center;
    gap: 7pt;
    margin-bottom: 28pt;
    opacity: 0.55;
  }
  .brand-header svg { width: 12pt; height: auto; }
  .brand-header span {
    font-size: 8pt;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--text);
  }

  /* ═══ HERO ═══ */
  .hero { margin-bottom: 24pt; }
  .hero h1 {
    font-size: 36pt;
    font-weight: 800;
    letter-spacing: -1.2px;
    color: var(--text);
    line-height: 1.05;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero .subtitle {
    font-size: 11pt;
    font-weight: 300;
    color: var(--text-secondary);
    margin-top: 6pt;
    letter-spacing: 0.2px;
  }
  .hero .oneliner {
    font-size: 8pt;
    color: var(--text-secondary);
    margin-top: 14pt;
    padding: 8pt 0;
    border-top: 1px solid var(--border);
    line-height: 1.55;
  }

  /* ═══ SECTION LABEL ═══ */
  .section-label {
    font-size: 6.5pt;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10pt;
  }

  /* ═══ GRID LAYOUTS ═══ */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14pt; margin-bottom: 18pt; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16pt; margin-bottom: 22pt; }

  .col-item h3 { font-size: 10.5pt; font-weight: 700; margin-bottom: 4pt; color: var(--text); }
  .col-item p { font-size: 8pt; color: var(--text-secondary); line-height: 1.5; }

  /* ═══ CARDS ═══ */
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12pt; margin-bottom: 22pt; }
  .card {
    padding: 9pt 11pt;
    background: var(--surface);
    border-radius: 4px;
  }
  .card h4 { font-size: 8.5pt; font-weight: 600; color: var(--text); margin-bottom: 2pt; }
  .card p { font-size: 7pt; color: var(--text-secondary); line-height: 1.45; }

  /* ═══ ARCHITECTURE BAR ═══ */
  .arch-bar { display: flex; margin-bottom: 22pt; border-radius: 4px; overflow: hidden; }
  .arch-cell { flex: 1; padding: 10pt 8pt; text-align: center; }
  .arch-cell .a-label { font-size: 6pt; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2pt; }
  .arch-cell .a-title { font-size: 9pt; font-weight: 700; color: var(--text); }
  .arch-cell .a-desc { font-size: 6.5pt; color: var(--text-secondary); margin-top: 2pt; line-height: 1.4; }
  .a-c1 { background: #fef3eb; }
  .a-c2 { background: #fdf6f0; }
  .a-c3 { background: #F7F6F6; }
  .a-c4 { background: #f3f8f5; }

  /* ═══ METRIC CARDS ═══ */
  .metric-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12pt; margin-bottom: 18pt; }
  .metric-card {
    text-align: center;
    padding: 8pt;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .metric-card .number { font-size: 22pt; font-weight: 800; color: var(--accent); }
  .metric-card .label { font-size: 6pt; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-top: 2pt; }

  /* ═══ CODE BLOCK (dark) ═══ */
  .fm-code {
    background: #1a1714;
    border-radius: 5px;
    padding: 9pt 11pt;
    font-family: 'JetBrains Mono', monospace;
    font-size: 6.5pt;
    line-height: 1.55;
    color: #d6d3d1;
    overflow: hidden;
    margin-bottom: 14pt;
  }
  .fm-code .c { color: #57534e; }
  .fm-code .k { color: #c4b5fd; }
  .fm-code .v { color: #67e8f9; }
  .fm-code .l { color: #fbbf24; }
  .fm-code .s { color: #6ee7b7; }

  /* ═══ TABLE ═══ */
  .brief-table { width: 100%; border-collapse: collapse; margin-bottom: 14pt; }
  .brief-table th { font-size: 6pt; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); padding: 6pt 8pt; text-align: left; border-bottom: 2px solid var(--accent); }
  .brief-table td { font-size: 7.5pt; padding: 5pt 8pt; border-bottom: 1px solid var(--border); color: var(--text-secondary); vertical-align: top; }
  .brief-table .highlight { color: var(--accent); font-weight: 600; }

  /* ═══ PULL QUOTE ═══ */
  .pull-quote {
    font-size: 11pt;
    font-weight: 300;
    font-style: italic;
    color: var(--text-secondary);
    text-align: center;
    padding: 12pt 20pt;
    line-height: 1.5;
  }

  /* ═══ TOOL STRIP ═══ */
  .tools { display: flex; gap: 0; border-top: 1px solid var(--border); padding-top: 10pt; }
  .tool { flex: 1; text-align: center; }
  .tool .t-name { font-size: 8.5pt; font-weight: 600; }
  .tool .t-name a { color: var(--accent); }
  .tool .t-desc { font-size: 6.5pt; color: var(--text-muted); margin-top: 1pt; }

  /* ═══ FOOTER (QG-1: margin-top auto) ═══ */
  .footer-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 6pt;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
  .footer-bar span { font-size: 6.5pt; color: var(--text-muted); }
  .footer-bar a { color: var(--text-muted); }

  /* ═══ PRINT & SCREEN ═══ */
  @media print {
    body { background: white; }
    .page { margin: 0; }
  }
  @media screen {
    body { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 24px; }
  }
</style>
